services:
  postgres:
    image: postgres:16-alpine
    container_name: academic_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-academic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-academic_secret}
      POSTGRES_DB: ${POSTGRES_DB:-academic_assistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-academic} -d ${POSTGRES_DB:-academic_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: academic_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: academic_api
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile.collector
    container_name: academic_collector
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
